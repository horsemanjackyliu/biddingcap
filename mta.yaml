_schema-version: 3.3.0
ID: bidauction
description: A simple CAP project.
version: 1.0.0
modules:
  - name: bidauction-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: bidauction-auth
      - name: bidauction-db
      - name: bidauction-attachments
      - name: bidauction-destination
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    properties:
      AI_RESOURCE_GROUP: default
    build-parameters:
      builder: npm
  - name: bidauction-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: bidauction-db
    parameters:
      buildpack: nodejs_buildpack
  - name: bidauction-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: bidauction-auth
      - name: srv-api
      - name: bidauction-html5-repo-host
        parameters:
          config:
            HTML5Runtime_enabled: true
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - artifacts:
            - biddingapplication.zip
          name: bidauctionbiddingapplication
          target-path: app/
        - artifacts:
            - bidui5app.zip
          name: bidauctionbidui5app
          target-path: app/
        - artifacts:
            - evaluationresults.zip
          name: evaluationresults
          target-path: app/
  - name: bidauctionbiddingapplication
    type: html5
    path: app/biddingapplication
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []
  - name: bidauctionbidui5app
    type: html5
    path: app/bidui5app
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []
  - name: bidauction-destinations
    type: com.sap.application.content
    requires:
      - name: bidauction-auth
        parameters:
          service-key:
            name: bidauction-auth-key
      - name: bidauction-html5-repo-host
        parameters:
          service-key:
            name: bidauction-html5-repo-host-key
      - name: srv-api
      - name: bidauction-destination
        parameters:
          content-target: true
    parameters:
      content:
        instance:
          destinations:
            - Name: bidauction-html5-repository
              ServiceInstanceName: bidauction-html5-repo-host
              ServiceKeyName: bidauction-html5-repo-host-key
              sap.cloud.service: bidauction.service
            - Authentication: OAuth2UserTokenExchange
              Name: bidauction-auth
              ServiceInstanceName: bidauction-auth
              ServiceKeyName: bidauction-auth-key
              sap.cloud.service: bidauction.service
          existing_destinations_policy: update
    build-parameters:
      no-source: true
  - name: evaluationresults
    type: html5
    path: app/evaluationresults
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []
resources:
  - name: bidauction-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: bidauction-${org}-${space}
      path: ./xs-security.json
      service: xsuaa
      service-plan: application
  - name: bidauction-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: bidauction-attachments
    type: org.cloudfoundry.managed-service
    parameters:
      service: objectstore
      service-plan: standard
  - name: bidauction-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: bidauction-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npx cds build --production
